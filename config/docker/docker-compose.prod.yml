services:
  # Tu-Link Backend Application - Production
  api:
    build:
      context: ../../
      dockerfile: config/docker/Dockerfile
      target: production
    container_name: tulink-api-prod
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ../../.env
    expose:
      - "3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tulink-network
      - web
    restart: unless-stopped
    volumes:
      - ../../logs:/usr/src/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');http.get('http://localhost:3000/health',(res)=>{process.exit(res.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis Cache Database - Production
  redis:
    image: redis:7-alpine
    container_name: tulink-redis-prod
    expose:
      - "6379"
    volumes:
      - redis_prod_data:/data
    command: redis-server --appendonly yes --save 900 1 --save 300 10 --save 60 10000
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - tulink-network
    restart: unless-stopped

networks:
  tulink-network:
    driver: bridge
    internal: true
  web:
    external: true

volumes:
  redis_prod_data:
    driver: local