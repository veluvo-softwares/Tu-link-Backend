services:
  # Tu-Link Backend Application - Development (replaces api-dev nginx)
  api-dev:
    build:
      context: ../../
      dockerfile: config/docker/Dockerfile
      target: development
    container_name: api-dev
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ../../.env
    expose:
      - "3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tulink-network
      - web
    restart: unless-stopped
    profiles:
      - server
    volumes:
      - ../../src:/usr/src/app/src:ro
      - ../../logs:/usr/src/app/logs
    command: npm run start:dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
      
  # Local development version of api-dev without server networks
  api-dev-local:
    build:
      context: ../../
      dockerfile: config/docker/Dockerfile
      target: development
    container_name: api-dev-local
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ../../.env
    ports:
      - "3001:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - local-dev
    restart: unless-stopped
    profiles:
      - local
    volumes:
      - ../../src:/usr/src/app/src:ro
      - ../../logs:/usr/src/app/logs
    command: npm run start:dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Redis Cache Database - Development
  redis:
    image: redis:7-alpine
    container_name: tulink-redis-dev
    # No host port is published — Redis is reachable ONLY over the internal
    # Docker network (tulink-network / local-dev) by the api service. For
    # debugging use: docker exec -it tulink-redis-dev redis-cli -a "$REDIS_PASSWORD"
    expose:
      - "6379"
    # REDISCLI_AUTH lets the healthcheck's `redis-cli ping` authenticate without
    # putting the password on the command line (where it'd show in `ps`).
    environment:
      - REDISCLI_AUTH=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    volumes:
      - redis_dev_data:/data
    # Require authentication so only the app — which supplies REDIS_PASSWORD
    # from the repo-root .env — can read/write. The :? guard makes the deploy
    # fail loudly if REDIS_PASSWORD is unset rather than silently running open.
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env} --appendonly yes --save "" --stop-writes-on-bgsave-error no
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - tulink-network  # Server profile
      - local-dev       # Local profile
    restart: unless-stopped

networks:
  tulink-network:
    driver: bridge
    internal: false
  web:
    external: true
  local-dev:
    driver: bridge
    internal: false

volumes:
  redis_dev_data:
    driver: local
