services:
  # Tu-Link Backend Application - Development (replaces api-dev nginx)
  api-dev:
    build:
      context: ../../
      dockerfile: config/docker/Dockerfile
      target: development
    container_name: api-dev
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ../../.env
    expose:
      - "3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tulink-network
      - web
    restart: unless-stopped
    profiles:
      - server
    volumes:
      - ../../src:/usr/src/app/src:ro
      - ../../logs:/usr/src/app/logs
    command: npm run start:dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
      
  # Local development version of api-dev without server networks
  api-dev-local:
    build:
      context: ../../
      dockerfile: config/docker/Dockerfile
      target: development
    container_name: api-dev-local
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ../../.env
    ports:
      - "3001:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - local-dev
    restart: unless-stopped
    profiles:
      - local
    volumes:
      - ../../src:/usr/src/app/src:ro
      - ../../logs:/usr/src/app/logs
    command: npm run start:dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Redis Cache Database - Development
  redis:
    image: redis:7-alpine
    container_name: tulink-redis-dev
    # No host port is published — Redis is reachable ONLY over the internal
    # Docker network (tulink-network / local-dev) by the api service. Debug with:
    #   docker exec -it tulink-redis-dev sh -c 'redis-cli -a "$REDIS_PASSWORD" ...'
    expose:
      - "6379"
    # Read REDIS_PASSWORD from the SAME .env the app uses (container env), so the
    # two always match. We expand it inside the container (not via Compose
    # ${...} interpolation) so it works no matter where `docker compose` runs.
    env_file:
      - ../../.env
    volumes:
      - redis_dev_data:/data
    # Require authentication so only the app (which has the password) can
    # read/write. `$$` is escaped so Compose passes a literal `$` and the
    # container's shell expands REDIS_PASSWORD from its env. Fail loudly if it's
    # empty rather than running open. `exec` keeps redis-server as PID 1.
    command: >
      sh -c 'test -n "$$REDIS_PASSWORD" || { echo "REDIS_PASSWORD must be set in .env"; exit 1; };
      exec redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes --save "" --stop-writes-on-bgsave-error no'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - tulink-network  # Server profile
      - local-dev       # Local profile
    restart: unless-stopped

networks:
  tulink-network:
    driver: bridge
    internal: false
  web:
    external: true
  local-dev:
    driver: bridge
    internal: false

volumes:
  redis_dev_data:
    driver: local
