name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Test & Quality Checks
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint:check

      - name: Run type check
        run: npm run typecheck

      - name: Run tests
        run: npm test
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test

      - name: Run test coverage
        run: npm run test:cov
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level high

      - name: Run vulnerability scan with Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  build:
    name: Build & Docker
    runs-on: ubuntu-latest
    needs: [test, security]
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DROPLET_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.DROPLET_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to DigitalOcean Droplet
        run: |
          ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} << 'EOF'
            set -e
            
            # Navigate to application directory
            cd /opt/tulink-backend
            
            # Create backup of current deployment
            cp config/docker/docker-compose.dev.yml config/docker/docker-compose.dev.yml.backup.$(date +%Y%m%d_%H%M%S)
            
            # Pull latest changes
            git fetch origin
            git reset --hard origin/dev
            
            # Stop current containers
            docker compose -f config/docker/docker-compose.dev.yml down
            
            # Start containers with latest code (rebuild with new changes)
            docker compose -f config/docker/docker-compose.dev.yml up -d --build
            
            # Wait for deployment to complete and containers to be ready
            echo "Waiting for deployment to complete..."
            sleep 15
            
            # Check if containers are running
            if ! docker compose -f config/docker/docker-compose.dev.yml ps --services --filter "status=running" | grep -q "api-dev"; then
              echo "API container failed to start, checking logs..."
              docker compose -f config/docker/docker-compose.dev.yml logs api-dev
              exit 1
            fi
            
            # Wait for application to be ready and healthy
            echo "Testing application endpoint..."
            for i in {1..5}; do
              if curl -f -s http://localhost:3000/health > /dev/null 2>&1; then
                echo "Application is healthy!"
                break
              fi
              if [ $i -eq 5 ]; then
                echo "Health check failed after 5 attempts"
                echo "Deployment may still be in progress - check server logs"
                docker compose -f config/docker/docker-compose.dev.yml logs api-dev
                exit 1
              fi
              echo "Health check attempt $i/5 failed, retrying in 15s..."
              sleep 15
            done
            
            # Cleanup old images
            docker image prune -f
            
            # Remove old backups (keep last 5)
            ls -t config/docker/docker-compose.dev.yml.backup.* 2>/dev/null | tail -n +6 | xargs -r rm
            
            echo "Deployment completed successfully!"
          EOF

      - name: Verify deployment
        run: |
          # Additional verification from external access
          sleep 30
          
          # Test health endpoint from external access
          if curl -f -s http://${{ secrets.DROPLET_HOST }}:3000/health; then
            echo "✅ External health check successful!"
          else
            echo "❌ External health check failed!"
            echo "Checking if service is accessible..."
            ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} << 'EOF'
              cd /opt/tulink-backend
              docker compose -f config/docker/docker-compose.dev.yml ps
              docker compose -f config/docker/docker-compose.dev.yml logs --tail=50 api-dev
            EOF
            exit 1
          fi
          
          echo "🎉 Deployment verification successful!"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment to production successful!"
          else
            echo "❌ Deployment failed!"
          fi