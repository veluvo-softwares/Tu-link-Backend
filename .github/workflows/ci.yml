name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test & Quality Checks
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: tulink
          POSTGRES_PASSWORD: tulink_ci
          POSTGRES_DB: tulink
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tulink -d tulink"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Used by drizzle-kit migrate and any DB-backed tests.
      DATABASE_URL: postgresql://tulink:tulink_ci@localhost:5432/tulink
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: tulink
      POSTGRES_PASSWORD: tulink_ci
      POSTGRES_DB: tulink

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint:check

      - name: Run type check
        run: npm run typecheck

      - name: Apply database migrations
        # Validates that the Drizzle migrations apply cleanly against PostGIS.
        run: npm run db:migrate

      - name: Run tests
        run: npm test
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test

      - name: Run test coverage
        run: npm run test:cov
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        # Gate on critical only: remaining high-severity advisories are
        # transitive deps of firebase-admin / @nestjs whose only npm-audit
        # "fix" is a breaking downgrade. Tracked for a forward-upgrade PR.
        run: npm audit --audit-level critical

      - name: Run vulnerability scan with Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  build:
    name: Build & Docker
    runs-on: ubuntu-latest
    needs: [test, security]
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DROPLET_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.DROPLET_HOST }} >> ~/.ssh/known_hosts

      - name: Sync code to droplet
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env*' \
            --exclude='coverage' \
            --exclude='dist' \
            ./ ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:/root/tulink-backend/

      - name: Deploy to DigitalOcean Droplet
        run: |
          ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} << 'EOF'
            set -e

            cd /root/tulink-backend

            # Build the release without replacing the currently healthy API.
            docker compose -f config/docker/docker-compose.dev.yml --profile server build api-dev

            # Ensure the migration dependencies are healthy, then migrate using
            # the newly built image before switching the API container.
            docker compose -f config/docker/docker-compose.dev.yml --profile server up -d postgres redis

            echo "Applying database migrations..."
            # Disable stdin explicitly: this command runs inside an SSH heredoc,
            # and Compose otherwise consumes the remaining deployment script.
            docker compose -f config/docker/docker-compose.dev.yml --profile server run --rm --no-deps -T --interactive=false -e CI=true api-dev \
              sh -c 'DATABASE_URL="postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@postgres:5432/$POSTGRES_DB" npm run db:migrate'

            # Only replace the API after every migration has committed.
            docker compose -f config/docker/docker-compose.dev.yml --profile server up -d --no-build --force-recreate --remove-orphans api-dev

            # Wait for Docker's own health check to pass (port is internal, can't curl from host)
            echo "Waiting for api-dev to be healthy..."
            for i in {1..30}; do
              status=$(docker inspect --format='{{.State.Health.Status}}' api-dev 2>/dev/null)
              if [ "$status" = "healthy" ]; then
                echo "api-dev is healthy!"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "Health check failed after 30 attempts (last status: $status)"
                exit 1
              fi
              echo "Attempt $i/30: status=$status, waiting 10s..."
              sleep 10
            done

            # Reload Caddy so the reverse proxy drops stale keepalive
            # connections to the previous api-dev container and re-resolves
            # the freshly recreated one (avoids a transient 502 window).
            if docker inspect caddy >/dev/null 2>&1; then
              docker exec caddy caddy reload --config /etc/caddy/Caddyfile
            else
              echo "caddy container not found, skipping reload"
            fi

            # Cleanup dangling images
            docker image prune -f

            echo "Deployment completed successfully!"
          EOF

      - name: Verify deployment
        # Retry the public health check: right after container recreation the
        # proxy may briefly serve a stale upstream, so a single curl is flaky.
        run: |
          for i in {1..12}; do
            if curl -sf --connect-timeout 5 --max-time 10 https://api.dev.tulink.xyz/health; then
              echo "Deployment verification successful!"
              exit 0
            fi
            echo "Attempt $i/12 failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check never passed after 120s"
          exit 1

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment to dev successful!"
          else
            echo "❌ Deployment to dev failed!"
          fi
